<ng-toast [style]="{width:'300px'}"></ng-toast>


<form id="emailForm" (ngSubmit)="onSubmit(emailFormRef.value)" #emailFormRef="ngForm">
  <!-- Email Subject -->
  <div class="form-group">
    <label for="emailSubject">Subject</label>
    <input type="text" class="form-control" id="emailSubject" name="emailSubject" [(ngModel)]="emailSubject" placeholder="Enter subject" required>
  </div>

  <!-- CC Email -->
  <div class="form-group">
    <label for="ccEmail">CC</label>
    <input type="email" class="form-control" id="ccEmail" name="ccEmail" [(ngModel)]="ccEmail" placeholder="Enter CC email">
  </div>

  <!-- BCC Email -->
  <div class="form-group">
    <label for="bccEmail">BCC</label>
    <input type="email" class="form-control" id="bccEmail" name="bccEmail" [(ngModel)]="bccEmail" placeholder="Enter BCC email">
  </div>

  <!-- API Key for Brevo -->
  <div class="form-group">
    <label for="apiKey">API Key</label>
    <input type="text" class="form-control" id="apiKey" name="apiKey" [(ngModel)]="apiKey" placeholder="Enter API Key" required>
  </div>

  <!-- sender email, name -->
  <div class="form-group">
    <label for="senderEmail">Sender Email</label>
    <input type="email" class="form-control" id="senderEmail" name="senderEmail" [(ngModel)]="senderEmail" placeholder="Enter sender email" required>
  </div>
  <div class="form-group">
    <label for="senderEmail">Sender Name</label>
    <input type="text" class="form-control" id="senderName" name="senderName" [(ngModel)]="senderName" placeholder="Enter sender Name" required>
  </div>
  <div class="form-group">
    <label for="FilePath">FilePath</label>
    <input type="text" class="form-control" id="FilePath" name="FilePath" [(ngModel)]="FilePath" placeholder="FilePath" >
  </div>

  <!-- Email Content with CKEditor -->
  <div class="form-group">
    <label for="emailContent">Email Content</label>
    <ckeditor id="emailContent" name="emailContent" [editor]="Editor" [(ngModel)]="model.editorData"></ckeditor>
  </div>
