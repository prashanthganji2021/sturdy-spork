name: Scheduled Cron Job

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-scheduled-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm ci

      - name: Cleanup old Playwright browser cache (older than 15 days)
        run: |
          if [ -d ~/.cache/ms-playwright ]; then
            echo "Cleaning old Playwright cache..."
            find ~/.cache/ms-playwright -type f -mtime +15 -delete 2>/dev/null || true
            find ~/.cache/ms-playwright -type d -empty -delete 2>/dev/null || true
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: playwright-report
      #     path: test-results
      #     retention-days: 5
